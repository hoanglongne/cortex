name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build and Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build all apps
        run: pnpm turbo run build --filter=!@cortex/api
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-key"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "placeholder-key"
          NEXT_PUBLIC_CORTEX_API_URL: "http://localhost:3001"
          NEXT_PUBLIC_CORTEX_HUB_URL: "http://localhost:3000"
